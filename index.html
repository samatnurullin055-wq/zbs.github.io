
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZBS</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <style>
    :root {
      --bg: #f4f6f8;
      --surface: #ffffff;
      --line: #dde1e6;
      --text: #121417;
      --muted: #6b7280;
      --brand: #f2c200;
      --danger: #ef4444;
      --good: #16a34a;
      --shadow: 0 14px 30px rgba(15, 23, 42, 0.08);
    }
    :root[data-theme="dark"] {
      --bg: #050505;
      --surface: #0d0d0d;
      --line: #252525;
      --text: #f2f2f2;
      --muted: #a3a3a3;
      --brand: #f4d44e;
      --danger: #f87171;
      --good: #4ade80;
      --shadow: 0 14px 30px rgba(0, 0, 0, 0.35);
    }
    :root[data-theme="sunset"] {
      --bg: #fff4ed;
      --surface: #fffdfb;
      --line: #ffd8c2;
      --text: #3a2318;
      --muted: #996e58;
      --brand: #f0b400;
      --danger: #dc2626;
      --good: #15803d;
      --shadow: 0 14px 30px rgba(125, 64, 35, 0.12);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        radial-gradient(1200px 560px at -10% -20%, color-mix(in srgb, var(--brand), transparent 90%), transparent 55%),
        radial-gradient(900px 400px at 120% 110%, color-mix(in srgb, var(--brand), transparent 95%), transparent 50%),
        var(--bg);
      color: var(--text);
    }
    button, input, textarea { font-family: inherit; }
    .hidden { display: none !important; }

    .btn { border: none; border-radius: 11px; padding: 10px 13px; font-weight: 700; cursor: pointer; }
    .btn-p { background: var(--brand); color: #fff; }
    .btn-m { background: color-mix(in srgb, var(--surface), #999 20%); color: var(--text); }
    .btn-o { background: transparent; border: 1px solid var(--line); color: var(--text); }
    .btn-d { background: color-mix(in srgb, var(--danger), var(--surface) 84%); color: var(--danger); }

    input, textarea {
      width: 100%; border: 1px solid var(--line); border-radius: 11px; padding: 11px 12px;
      background: var(--surface); color: var(--text); outline: none;
    }
    input:focus, textarea:focus { border-color: var(--brand); box-shadow: 0 0 0 3px color-mix(in srgb, var(--brand), transparent 84%); }

    .auth { min-height: 100vh; display: grid; place-items: center; padding: 16px; }
    .auth-card { width: 100%; max-width: 440px; border: 1px solid var(--line); border-radius: 18px; overflow: hidden; background: var(--surface); box-shadow: var(--shadow); }
    .logo { font-size: 34px; font-weight: 800; text-align: center; letter-spacing: -.03em; padding: 24px; }
    .logo span { color: var(--brand); }
    .tabs { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
    .tab { border: none; background: var(--surface); color: var(--muted); padding: 12px; font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent; }
    .tab.active { color: var(--text); border-bottom-color: var(--brand); }
    .form { padding: 16px; display: grid; gap: 10px; }
    .msg { min-height: 20px; padding: 0 16px 14px; color: var(--danger); font-size: 13px; }

    .app { min-height: 100vh; display: flex; justify-content: center; padding-bottom: 82px; }
    .phone { width: 100%; max-width: 1140px; }
    .top {
      position: sticky; top: 0; z-index: 40; backdrop-filter: blur(10px);
      background: color-mix(in srgb, var(--surface), transparent 20%);
      border-bottom: 1px solid var(--line);
      display: flex; justify-content: space-between; align-items: center; padding: 18px 26px; min-height: 98px;
    }
    .top .logo { font-size: 29px; padding: 0; text-align: left; cursor: pointer; }
    .top-user { display: flex; align-items: center; gap: 8px; font-weight: 700; cursor: pointer; }
    .avatar { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; border: 1px solid var(--line); background: #ddd; }

    .view { padding: 12px; }
    .panel {
      background: color-mix(in srgb, var(--surface), transparent 14%);
      border: 1px solid color-mix(in srgb, var(--line), #fff 16%);
      border-radius: 16px;
      padding: 12px;
      backdrop-filter: blur(18px) saturate(115%);
      -webkit-backdrop-filter: blur(18px) saturate(115%);
    }

    .feed-switch { display: flex; gap: 8px; margin-bottom: 10px; }
    .switch-btn { flex: 1; border: 1px solid var(--line); border-radius: 11px; background: var(--surface); color: var(--muted); padding: 8px; font-weight: 700; cursor: pointer; }
    .switch-btn.active { border-color: color-mix(in srgb, var(--brand), #fff 30%); color: var(--brand); background: color-mix(in srgb, var(--brand), var(--surface) 94%); }

    .feed { display: grid; gap: 12px; }
    .post { background: color-mix(in srgb, var(--surface), transparent 14%); border: 1px solid color-mix(in srgb, var(--line), #fff 12%); border-radius: 16px; overflow: hidden; backdrop-filter: blur(20px) saturate(110%); -webkit-backdrop-filter: blur(20px) saturate(110%); box-shadow: var(--shadow); }
    .post-head { display: flex; justify-content: space-between; align-items: center; padding: 11px 12px; }
    .post-author { display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: 700; }
    .post-author small { display: block; color: var(--muted); font-size: 12px; font-weight: 500; }
    .v-badge { display:inline-grid; place-items:center; width:16px; height:16px; border-radius:999px; background:linear-gradient(180deg,#ffe477,#f2bc00); border:1px solid #bf8b00; color:#342600; font-size:11px; font-weight:900; margin-left:6px; }

    .media-wrap { width: 100%; overflow-x: auto; display: grid; grid-auto-flow: column; grid-auto-columns: 100%; scroll-snap-type: x mandatory; scrollbar-width:none; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
    .media-wrap::-webkit-scrollbar { display:none; }
    .media-item { scroll-snap-align: start; width: 100%; background: #000; max-height: 560px; object-fit: contain; }
    .media-item.image { object-fit: cover; background: #eee; }
    .media-shell { position: relative; }
    .media-arrow { position:absolute; top:50%; transform:translateY(-50%); width:36px; height:36px; border-radius:999px; border:1px solid color-mix(in srgb,var(--line),#fff 24%); background:color-mix(in srgb,var(--surface),transparent 18%); backdrop-filter:blur(12px); color:var(--text); cursor:pointer; z-index:4; }
    .media-arrow.left { left:10px; }
    .media-arrow.right { right:10px; }

    .text-post { padding: 24px 16px; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); font-size: 20px; font-weight: 700; line-height: 1.35; white-space: pre-wrap; }

    .caption-box {
      padding: 11px 12px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--brand), var(--surface) 95%);
      line-height: 1.45;
    }
    .caption-box b { margin-right: 6px; }

    .post-actions { display: flex; justify-content: space-between; align-items: center; padding: 10px 12px; }
    .left-actions { display: flex; gap: 12px; align-items: center; }
    .icon { border: none; background: none; font-size: 22px; cursor: pointer; color: var(--text); }
    .icon.liked { color: var(--danger); }
    .icon.reposted { color: var(--good); }

    .body { padding: 0 12px 12px; display: grid; gap: 8px; }
    .meta { display: flex; gap: 12px; color: var(--muted); font-size: 13px; }
    .likes { font-weight: 800; color: var(--text); font-size: 14px; }

    .comments { display: grid; gap: 6px; }
    .comment { border: 1px solid var(--line); border-radius: 10px; padding: 8px; background: color-mix(in srgb, var(--surface), transparent 18%); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .comment.reply { margin-left: 18px; }
    .c-main { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .c-text { font-size: 13px; line-height: 1.35; }
    .c-actions { display: flex; gap: 10px; align-items: center; font-size: 12px; color: var(--muted); margin-top: 5px; flex-wrap: wrap; }
    .c-actions button { border: none; background: none; color: inherit; cursor: pointer; }
    .author-like { color: var(--good); font-weight: 700; }
    .reply-form { margin-top: 6px; display: grid; grid-template-columns: 1fr auto; gap: 8px; }

    .comment-form { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
    .comment-form .btn { padding: 9px 10px; }

    .search-users, .notifs, .trends, .list-items { display: grid; gap: 8px; margin-top: 10px; }
    .row-item { border: 1px solid var(--line); border-radius: 10px; padding: 9px; display: flex; align-items: center; justify-content: space-between; gap: 8px; background: color-mix(in srgb, var(--surface), transparent 16%); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); cursor: pointer; }
    .row-main { display: flex; align-items: center; gap: 9px; }
    .notif.unread { border-color: color-mix(in srgb, var(--brand), #fff 30%); background: color-mix(in srgb, var(--brand), var(--surface) 94%); }

    .grid { margin-top: 8px; display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
    .grid img, .grid video { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid var(--line); background: #ddd; }

    .phead { background: color-mix(in srgb, var(--surface), transparent 8%); border: 1px solid color-mix(in srgb, var(--line), #fff 12%); border-radius: 16px; padding: 14px; display: grid; gap: 12px; backdrop-filter: blur(16px) saturate(120%); -webkit-backdrop-filter: blur(16px) saturate(120%); }
    .pmain { display: flex; gap: 12px; align-items: center; }
    .pmain .avatar { width: 86px; height: 86px; }
    .name { font-size: 22px; font-weight: 800; }
    .stats { display: flex; flex-wrap: wrap; gap: 14px; }
    .stats b { display: block; font-size: 17px; }
    .quick { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }

    .side-nav {
      position: fixed;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 60;
      width: 94px;
      border: 1px solid color-mix(in srgb, var(--line), #fff 18%);
      border-radius: 24px;
      background: color-mix(in srgb, var(--surface), transparent 26%);
      backdrop-filter: blur(20px) saturate(105%);
      -webkit-backdrop-filter: blur(20px) saturate(105%);
      box-shadow: var(--shadow);
      overflow: hidden;
      transition: width .26s ease;
      position: fixed;
      isolation: isolate;
    }
    .side-nav::before {
      content: "";
      position: absolute;
      top: -18px;
      bottom: -18px;
      right: -62px;
      width: 66px;
      border-radius: 18px;
      background: transparent;
      z-index: -1;
    }
    .side-nav:hover, .side-nav.near { width: 320px; border-radius: 40px; }
    .nav-in { display: grid; gap: 2px; padding: 8px; }
    .nb {
      border: none;
      background: transparent;
      color: var(--muted);
      border-radius: 12px;
      padding: 13px 14px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
      white-space: nowrap;
    }
    .nb-label {
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity .2s ease, transform .2s ease;
      font-size: 14px;
      font-weight: 700;
    }
    .side-nav:hover .nb-label { opacity: 1; transform: translateX(0); }
    .nb.active { color: var(--text); background: color-mix(in srgb, var(--brand), var(--surface) 92%); }

    .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.52); display: none; align-items: center; justify-content: center; padding: 12px; z-index: 90; }
    .modal {
      width: 100%;
      max-width: 560px;
      border: 1px solid color-mix(in srgb, var(--line), #fff 14%);
      border-radius: 18px;
      overflow: hidden;
      background: color-mix(in srgb, var(--surface), transparent 16%);
      box-shadow: var(--shadow);
      backdrop-filter: blur(20px) saturate(110%);
      -webkit-backdrop-filter: blur(20px) saturate(110%);
    }
    .modal .mf { max-height: calc(90vh - 72px); overflow: auto; }
    #adminBg .modal { max-width: min(1120px, 96vw); max-height: 92vh; }
    #adminBody { max-height: calc(92vh - 82px); overflow: auto; padding-right: 4px; }
    .mh { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid var(--line); font-weight: 800; }
    .mf { padding: 12px; display: grid; gap: 10px; }
    .previews { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; }
    .previews img, .previews video { width: 100%; aspect-ratio: 1; object-fit: cover; border-radius: 8px; border: 1px solid var(--line); }

    .theme-list { display: grid; gap: 8px; }
    .theme-item { border: 1px solid var(--line); border-radius: 10px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
    .empty { padding: 22px; text-align: center; color: var(--muted); border: 1px dashed var(--line); border-radius: 12px; background: var(--surface); }

    @media (max-width: 920px) {
      .side-nav {
        left: 0;
        right: 0;
        bottom: 0;
        top: auto;
        transform: none;
        width: 100%;
        border-radius: 0;
      }
      .side-nav:hover { width: 100%; }
      .nav-in { grid-template-columns: repeat(5, 1fr); padding: 0; }
      .nb { justify-content: center; border-radius: 0; padding: 13px 10px; }
      .nb-label { display: none; }
      .app { padding-bottom: 82px; }
    }
    @media (min-width: 921px) {
      .view { padding: 16px 16px 16px 118px; }
      .app { padding-bottom: 0; }
    }
  </style>
</head>
<body>
  <section id="auth" class="auth">
    <div class="auth-card">
      <div class="logo">Z<span>BS</span></div>
      <div class="tabs">
        <button class="tab active" data-tab="login">Войти</button>
        <button class="tab" data-tab="reg">Регистрация</button>
      </div>
      <form id="loginF" class="form">
        <input id="loginId" type="text" placeholder="Email или username" required />
        <input id="loginPw" type="password" placeholder="Пароль" required />
        <button class="btn btn-p" type="submit">Войти</button>
      </form>
      <form id="regF" class="form hidden">
        <input id="regDisplay" type="text" placeholder="Отображаемое имя" required />
        <input id="regUsername" type="text" placeholder="Username (уникальный)" required />
        <input id="regEmail" type="email" placeholder="Email" required />
        <input id="regPw" type="password" placeholder="Пароль" required />
        <button class="btn btn-p" type="submit">Зарегистрироваться</button>
      </form>
      <div id="authMsg" class="msg"></div>
    </div>
  </section>

  <section id="app" class="app hidden">
    <div class="phone">
      <header class="top">
        <div id="logoBtn" class="logo" style="padding:0;font-size:36px;text-align:left;cursor:pointer">Z<span>BS</span></div>
        <div id="topUser" class="top-user"><img id="topAvatar" class="avatar" alt="avatar" /><span id="topName"></span></div>
      </header>

      <main>
        <section id="feedV" class="view">
          <div class="feed-switch">
            <button class="switch-btn active" data-feed-mode="for_you">For You</button>
            <button class="switch-btn" data-feed-mode="following">Following</button>
          </div>
          <div id="feed" class="feed"></div>
        </section>

        <section id="searchV" class="view hidden">
          <div class="panel"><h3>Поиск</h3><input id="searchIn" type="text" placeholder="username/email/подпись/хэштег" /><div id="searchUsers" class="search-users"></div><h3 style="margin-top:10px">Рекомендации</h3><div id="recUsers" class="search-users"></div></div>
          <div class="panel" style="margin-top:10px"><h3>Тренды (X)</h3><div id="trends" class="trends"></div></div>
          <div class="panel" style="margin-top:10px"><h3>Посты</h3><div id="explore" class="grid"></div></div>
        </section>

        <section id="notifV" class="view hidden">
          <div class="panel"><div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap"><h3>Уведомления</h3><button id="readAll" class="btn btn-m" type="button">Прочитано</button></div><div id="notifs" class="notifs"></div></div>
        </section>

        <section id="profileV" class="view hidden"><div id="profile"></div></section>
      </main>
    </div>

    <nav class="side-nav"><div class="nav-in">
      <button class="nb active" data-view="feed"><i class="fa-solid fa-house"></i><span class="nb-label">Лента</span></button>
      <button class="nb" data-view="search"><i class="fa-solid fa-magnifying-glass"></i><span class="nb-label">Поиск</span></button>
      <button class="nb" id="openCreate"><i class="fa-solid fa-square-plus"></i><span class="nb-label">Создать</span></button>
      <button class="nb" data-view="notif"><i class="fa-regular fa-heart"></i><span class="nb-label">Уведомления</span></button>
      <button class="nb" data-view="profile"><i class="fa-regular fa-user"></i><span class="nb-label">Профиль</span></button>
    </div></nav>
  </section>

  <div id="createBg" class="modal-bg">
    <div class="modal">
      <div class="mh"><span id="createTitle">Создать</span><button id="closeCreate" class="icon" type="button"><i class="fa-solid fa-xmark"></i></button></div>
      <form id="createF" class="mf">
        <input id="fileIn" type="file" accept="image/*,video/*" multiple />
        <div id="previews" class="previews"></div>
        <textarea id="capIn" rows="4" placeholder="Подпись или текст поста (можно без файла)"></textarea>
        <button class="btn btn-p" type="submit">Опубликовать</button>
      </form>
    </div>
  </div>

  <div id="settingsBg" class="modal-bg">
    <div class="modal" style="max-width:560px">
      <div class="mh"><span>Настройки профиля</span><button id="closeSettings" class="icon" type="button"><i class="fa-solid fa-xmark"></i></button></div>
      <form id="settingsF" class="mf">
        <input id="setDisplayName" type="text" placeholder="Отображаемое имя" />
        <input id="setAvatar" type="text" placeholder="URL аватара (необязательно)" />
        <input id="setAvatarFile" type="file" accept="image/*" />
        <textarea id="setBio" rows="3" placeholder="Био"></textarea>
        <div>
          <div style="font-weight:800;margin-bottom:8px">Тема</div>
          <div class="theme-list">
            <label class="theme-item"><span>Light</span><input type="radio" name="theme" value="light" /></label>
            <label class="theme-item"><span>Dark</span><input type="radio" name="theme" value="dark" /></label>
            <label class="theme-item"><span>Sunset</span><input type="radio" name="theme" value="sunset" /></label>
          </div>
        </div>
        <button class="btn btn-p" type="submit">Сохранить</button>
      </form>
    </div>
  </div>

  <div id="listBg" class="modal-bg">
    <div class="modal" style="max-width:620px">
      <div class="mh"><span id="listTitle">Список</span><button id="closeList" class="icon" type="button"><i class="fa-solid fa-xmark"></i></button></div>
      <div id="listBody" class="mf"><div class="list-items" id="listItems"></div></div>
    </div>
  </div>

  <div id="postBg" class="modal-bg">
    <div class="modal" style="max-width:780px">
      <div class="mh"><span id="postTitle">Пост</span><button id="closePost" class="icon" type="button"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="mf"><div id="postBody"></div></div>
    </div>
  </div>

  <div id="verifyBg" class="modal-bg">
    <div class="modal" style="max-width:560px">
      <div class="mh"><span>Получить галочку</span><button id="closeVerify" class="icon" type="button"><i class="fa-solid fa-xmark"></i></button></div>
      <form id="verifyF" class="mf">
        <textarea id="verifyText" rows="4" placeholder="Кто вы и зачем нужна галочка" required></textarea>
        <input id="verifyFiles" type="file" multiple />
        <button class="btn btn-p" type="submit">Отправить</button>
      </form>
    </div>
  </div>

  <div id="adminBg" class="modal-bg">
    <div class="modal" style="max-width:980px">
      <div class="mh"><span>Админ панель</span><button id="closeAdmin" class="icon" type="button"><i class="fa-solid fa-xmark"></i></button></div>
      <div id="adminBody" class="mf"></div>
    </div>
  </div>

  <script>
    const K={u:'stogram_users',p:'stogram_posts',f:'stogram_follows',n:'stogram_notifs',vr:'stogram_verify_requests',c:'stogram_current',seed:'stogram_seed_v5',theme:'stogram_theme',feedMode:'stogram_feed_mode'};
    const API_BASE='http://127.0.0.1:8000/api';
    const qs=s=>document.querySelector(s), qsa=s=>document.querySelectorAll(s);
    const el={
      auth:qs('#auth'),app:qs('#app'),msg:qs('#authMsg'),loginF:qs('#loginF'),regF:qs('#regF'),tabs:qsa('.tab'),
      regDisplay:qs('#regDisplay'),regUsername:qs('#regUsername'),
      topName:qs('#topName'),topAvatar:qs('#topAvatar'),topUser:qs('#topUser'),logoBtn:qs('#logoBtn'),
      feedV:qs('#feedV'),searchV:qs('#searchV'),notifV:qs('#notifV'),profileV:qs('#profileV'),feed:qs('#feed'),
      searchIn:qs('#searchIn'),searchUsers:qs('#searchUsers'),recUsers:qs('#recUsers'),explore:qs('#explore'),trends:qs('#trends'),
      notifs:qs('#notifs'),readAll:qs('#readAll'),profile:qs('#profile'),nav:qsa('.nb'),feedSwitch:qsa('.switch-btn'),
      openCreate:qs('#openCreate'),createBg:qs('#createBg'),closeCreate:qs('#closeCreate'),createF:qs('#createF'),fileIn:qs('#fileIn'),previews:qs('#previews'),capIn:qs('#capIn'),createTitle:qs('#createTitle'),
      settingsBg:qs('#settingsBg'),closeSettings:qs('#closeSettings'),settingsF:qs('#settingsF'),setDisplayName:qs('#setDisplayName'),setAvatar:qs('#setAvatar'),setAvatarFile:qs('#setAvatarFile'),setBio:qs('#setBio'),
      listBg:qs('#listBg'),closeList:qs('#closeList'),listTitle:qs('#listTitle'),listItems:qs('#listItems'),
      postBg:qs('#postBg'),closePost:qs('#closePost'),postBody:qs('#postBody'),
      verifyBg:qs('#verifyBg'),closeVerify:qs('#closeVerify'),verifyF:qs('#verifyF'),verifyText:qs('#verifyText'),verifyFiles:qs('#verifyFiles'),

      const nLast=notifs.length?`${notifs[notifs.length-1].id||''}:${notifs[notifs.length-1].createdAt||''}`:'';

    async function pullRemote(renderAfter=false){

        const r=await fetch(`${API_BASE}/state`);
        if(!r.ok)return false;

        const rs=d.state;
        const remoteEmpty=['users','posts','follows','notifs'].every(k=>Array.isArray(rs[k])&&rs[k].length===0);
        const localHas=st.users.length||st.posts.length||st.follows.length||st.notifs.length;
        if(remoteEmpty&&localHas){await pushRemote();return true;}
        if(st.remoteUpdated&&d.updated_at===st.remoteUpdated)return true;
        applyRemoteState(rs);
        st.remoteUpdated=d.updated_at||null;
        localSave();
        if(renderAfter&&st.uid&&user()){
          const after=contentStamp(st);
          if(after!==before)renderAll();
        }
        return true;
      }catch(_e){return false;}
    }

    function readFileAsDataURL(file){
      return new Promise((resolve,reject)=>{
        const isVideo=file.type.startsWith('video/');
        const isImage=file.type.startsWith('image/');
        if(isVideo && file.size>MAX_VIDEO_BYTES) return reject(new Error('video_too_large'));
        if(isImage && file.size>MAX_IMAGE_BYTES) return reject(new Error('image_too_large'));
        const r=new FileReader();
        r.onload=()=>{
          if(!isImage) return resolve(r.result);
          const img=new Image();
          img.onload=()=>{
            const maxW=1600, maxH=1600;
            const scale=Math.min(1,maxW/img.width,maxH/img.height);
            const w=Math.max(1,Math.round(img.width*scale));
            const h=Math.max(1,Math.round(img.height*scale));
            const canvas=document.createElement('canvas');
            canvas.width=w; canvas.height=h;
            const ctx=canvas.getContext('2d');
            ctx.drawImage(img,0,0,w,h);
            // Keep payload small for DB/browser stability.
            resolve(canvas.toDataURL('image/jpeg',0.78));
          };
          img.onerror=()=>resolve(r.result);
          img.src=r.result;
        };
        r.onerror=()=>reject(new Error('file_read_failed'));
        r.readAsDataURL(file);
      });
    }

    function setupFeedViewObserver(){
      if(feedViewObserver){feedViewObserver.disconnect();feedViewObserver=null;}
      feedViewObserver=new IntersectionObserver((entries)=>{
        entries.forEach(en=>{
          if(!en.isIntersecting||en.intersectionRatio<0.62)return;
          const pid=en.target.getAttribute('data-post');
          const p=postBy(pid);
          if(!p)return;
          trackView(p);
          if(feedViewObserver)feedViewObserver.unobserve(en.target);
        });
      },{threshold:[0.62]});
      qsa('.post[data-post]').forEach(node=>feedViewObserver.observe(node));
    }

        <div class='panel'>
          <h3>Заявки на галочку</h3>
          <div class='list-items'>${req.length?req.map(r=>{const u=userBy(r.userId)||{displayName:'user',username:'user'};const files=Array.isArray(r.attachments)?r.attachments:[];return`<div class='row-item' style='display:block;cursor:default'><div style='display:flex;justify-content:space-between;gap:8px;align-items:center'><b>${esc(u.displayName)} (@${esc(u.username)})</b><span style='color:var(--muted)'>${r.status}</span></div><div style='margin-top:6px;color:var(--muted)'>${esc(r.text||'')}</div><div style='margin-top:8px;display:flex;gap:8px;flex-wrap:wrap'>${files.length?files.map((a,ix)=>a&&a.src?`<a class='btn btn-o' href='${a.src}' download='${esc(a.name||`file_${ix}`)}'>Скачать ${esc((a.name||'файл').slice(0,16))}</a><a class='btn btn-m' href='${a.src}' target='_blank' rel='noopener'>Открыть</a>`:`<span class='btn btn-m'>${esc((a&&a.name)||'файл')}</span>`).join(''):`<span style="color:var(--muted);font-size:12px">Файлов нет</span>`}</div>${r.status==='pending'?`<div style='display:flex;gap:8px;margin-top:8px'><button class='btn btn-p' data-admin-v-approve='${r.id}' type='button'>Принять</button><button class='btn btn-d' data-admin-v-reject='${r.id}' type='button'>Отклонить</button></div>`:''}</div>`;}).join(''):`<div class='empty'>Заявок нет</div>`}</div>
        </div>
        <div class='panel'>
          <h3>Пользователи</h3>
          <div class='list-items'>${users.map(u=>`<div class='row-item' style='cursor:default'><div class='row-main'><img class='avatar' src='${u.avatar}'/><div><div><b>${esc(u.displayName||u.username)}${verifiedBadge(u)}</b> ${u.role==='admin'?'(admin)':''}</div><div style='color:var(--muted);font-size:12px'>@${esc(u.username)} ${u.blocked?'• заблокирован':''}</div></div></div>${u.role==='admin'?'':`<button class='btn ${u.blocked?'btn-m':'btn-d'}' data-admin-block='${u.id}' type='button'>${u.blocked?'Разблокировать':'Блокировать'}</button>`}</div>`).join('')}</div>
        </div>
        <div class='panel'>
          <h3>Свежие посты</h3>
          <div class='list-items'>${posts.length?posts.map(p=>{const u=userBy(p.userId)||{displayName:'user',username:'user'};return`<div class='row-item' style='cursor:default'><div class='row-main'><div><b>${esc(u.displayName||u.username)}${verifiedBadge(u)}</b><div style='color:var(--muted);font-size:12px'>${esc((p.caption||'Текстовый пост').slice(0,70))}</div></div></div><div style='display:flex;gap:8px'><button class='btn btn-o' data-admin-open-post='${p.id}' type='button'>Открыть</button><button class='btn btn-d' data-admin-del-post='${p.id}' type='button'>Удалить</button></div></div>`;}).join(''):`<div class='empty'>Постов нет</div>`}</div>
        </div>
      `;
      el.adminBg.style.display='flex';
    }
    function closeAdmin(){el.adminBg.style.display='none';el.adminBody.innerHTML='';}

    el.tabs.forEach(b=>b.addEventListener('click',()=>setTab(b.dataset.tab)));
    el.regF.addEventListener('submit',e=>{
      e.preventDefault();
      const err=reg(qs('#regDisplay').value,qs('#regUsername').value,qs('#regEmail').value,qs('#regPw').value);
      if(err){el.msg.textContent=err;return;}
      el.msg.textContent='Регистрация успешна';
      el.msg.style.color='var(--good)';
      setTimeout(showApp,220);
    });
    el.loginF.addEventListener('submit',e=>{e.preventDefault();const err=login(qs('#loginId').value,qs('#loginPw').value);if(err){el.msg.textContent=err;return;}showApp();});

    el.nav.forEach(b=>b.addEventListener('click',()=>setView(b.dataset.view)));
    el.logoBtn.addEventListener('click',()=>setView('feed'));
    el.topUser.addEventListener('click',()=>{st.profileId=st.uid;setView('profile');});
    el.feedSwitch.forEach(b=>b.addEventListener('click',()=>{st.feedMode=b.dataset.feedMode;save();renderFeed();}));

    el.openCreate.addEventListener('click',()=>openCreate());
    el.closeCreate.addEventListener('click',closeCreate);
    el.createBg.addEventListener('click',e=>{if(e.target===el.createBg)closeCreate();});
    let previewUrls=[];
    el.fileIn.addEventListener('change',()=>{
      previewUrls.forEach(u=>URL.revokeObjectURL(u));
      previewUrls=[];
      el.previews.innerHTML='';
      [...(el.fileIn.files||[])].slice(0,6).forEach(f=>{
        const src=URL.createObjectURL(f);
        previewUrls.push(src);
        const isVideo=(f.type||'').startsWith('video/');
        el.previews.innerHTML+=isVideo?`<video muted src='${src}'></video>`:`<img src='${src}' alt='p'/>`;
      });
    });
    el.createF.addEventListener('submit',async e=>{
      e.preventDefault();
      const files=[...(el.fileIn.files||[])].slice(0,6);
      const loaded=[];
      const failed=[];
      const reasons=[];
      for(const f of files){
        try{
          loaded.push({id:id('m'),type:f.type.startsWith('video/')?'video':'image',src:await readFileAsDataURL(f)});
        }catch(_e){
          failed.push(f.name||'file');
          reasons.push(_e&&_e.message?_e.message:'read_error');
        }
      }
      if(!loaded.length && !el.capIn.value.trim()){
        alert('Добавь текст или хотя бы один корректный файл.');
        return;
      }
      try{
        createPost(loaded,el.capIn.value);
        closeCreate();
        if(failed.length){
          let details='Часть файлов пропущена';
          if(reasons.includes('video_too_large')) details+=' (видео > 8MB не поддерживается)';
          if(reasons.includes('image_too_large')) details+=' (изображение слишком большое)';
          alert(`${details}: ${failed.slice(0,3).join(', ')}`);
        }
      }catch(err){
        const msg=(err&&err.message)?err.message:'';
        if(st.localQuotaHit || /quota|storage/i.test(msg)){
          alert('Локальное хранилище переполнено. Пост отправлен в общую БД, перезагрузи страницу.');
          return;
        }
        alert('Не удалось опубликовать пост. Попробуй еще раз.');
      }
    });

    el.feed.addEventListener('click',e=>{
      const post=e.target.closest('.post');
      if(!post)return;
      const pid=post.dataset.post;
      if(e.target.closest('.like')){toggleLike(pid);return;}
      if(e.target.closest('.save')){toggleSave(pid);return;}
      if(e.target.closest('.repost')){toggleRepost(pid);return;}
      const sl=e.target.closest('[data-slide]');
      if(sl){slideMedia(sl.dataset.mediaPost,sl.dataset.slide,post);return;}
      if(e.target.closest('.del-post')){if(confirm('Удалить пост?'))delPost(pid);return;}
      const op=e.target.closest('[data-open-profile]');
      if(op){st.profileId=op.dataset.openProfile;setView('profile');return;}
      const pp=e.target.closest('[data-open-post]');
      if(pp){openPost(pp.dataset.openPost);return;}
      if(e.target.closest('.cm-focus')){const i=post.querySelector('input[name="comment"]');if(i)i.focus();return;}
      const cl=e.target.closest('[data-comment-like]');
      if(cl){toggleCommentLike(pid,cl.dataset.commentLike);return;}
      const rb=e.target.closest('[data-reply-btn]');
      if(rb){const key=`${pid}:${rb.dataset.replyBtn}`;st.replyTarget=st.replyTarget===key?null:key;renderFeed();return;}

      const mc=e.target.closest('[data-more-comments]');
      if(mc){const key=`p:${pid}`;st.commentVisible[key]=(st.commentVisible[key]||1)+3;renderFeed();return;}
      const hc=e.target.closest('[data-hide-comments]');
      if(hc){const key=`p:${pid}`;st.commentVisible[key]=1;renderFeed();return;}
      const mr=e.target.closest('[data-more-replies]');
      if(mr){const key=`r:${pid}:${mr.dataset.moreReplies}`;st.replyVisible[key]=(st.replyVisible[key]||1)+3;renderFeed();return;}
      const hr=e.target.closest('[data-hide-replies]');
      if(hr){const key=`r:${pid}:${hr.dataset.hideReplies}`;st.replyVisible[key]=1;renderFeed();return;}
    });
    el.feed.addEventListener('input',e=>{
      const c=e.target.closest('.comment-form input[name="comment"]');
      if(c){const post=e.target.closest('.post');if(post)st.commentDrafts[post.dataset.post]=c.value;return;}
      const r=e.target.closest('[data-reply-form] input[name="reply"]');
      if(r){const post=e.target.closest('.post');const rf=e.target.closest('[data-reply-form]');if(post&&rf)st.replyDrafts[`${post.dataset.post}:${rf.dataset.replyForm}`]=r.value;}
    });
    el.feed.addEventListener('submit',e=>{
      const cf=e.target.closest('.comment-form');
      if(cf){
        e.preventDefault();
        const post=e.target.closest('.post');if(!post)return;
        const i=cf.querySelector('input[name="comment"]');
        const text=i.value||'';
        addComment(post.dataset.post,text);
        st.commentDrafts[post.dataset.post]='';
        i.value='';
        return;
      }
      const rf=e.target.closest('[data-reply-form]');
      if(rf){
        e.preventDefault();
        const post=e.target.closest('.post');if(!post)return;
        const i=rf.querySelector('input[name="reply"]');
        const key=`${post.dataset.post}:${rf.dataset.replyForm}`;
        const text=i.value||'';
        addReply(post.dataset.post,rf.dataset.replyForm,text);
        st.replyDrafts[key]='';
        i.value='';
      }
    });

    el.profile.addEventListener('click',e=>{
      if(e.target.id==='logout'){
        if(st.uid&&st.presence&&st.presence[st.uid])delete st.presence[st.uid];
        st.uid=null;save();showAuth();return;
      }
      if(e.target.id==='profCreate'){openCreate();return;}
      if(e.target.id==='openSettings'){openSettings();return;}
      if(e.target.id==='openVerify'){openVerify();return;}
      if(e.target.id==='openAdmin'){openAdmin();return;}
      if(e.target.id==='followBtn'){toggleFollow(st.profileId);return;}
      const b=e.target.closest('[data-list]');
      if(b){openList(b.dataset.list);return;}
      const p=e.target.closest('[data-post-open]');
      if(p){openPost(p.dataset.postOpen);return;}
    });

    el.settingsBg.addEventListener('click',e=>{if(e.target===el.settingsBg)closeSettings();});
    el.closeSettings.addEventListener('click',closeSettings);
    qsa('input[name="theme"]').forEach(i=>i.addEventListener('change',()=>setTheme(i.value)));
    el.settingsF.addEventListener('submit',async e=>{
      e.preventDefault();
      const u=user();
      if(!u)return;
      u.displayName=el.setDisplayName.value.trim()||u.username;
      u.bio=el.setBio.value.trim();
      const av=el.setAvatar.value.trim();
      if(el.setAvatarFile.files&&el.setAvatarFile.files[0]){
        if(el.setAvatarFile.files[0].size>MAX_AVATAR_BYTES){
          alert('Аватар слишком большой. Максимум 4MB.');
          return;
        }
        try{u.avatar=await readFileAsDataURL(el.setAvatarFile.files[0]);}
        catch(_e){alert('Не удалось загрузить аватар.');}
      }else{
        u.avatar=av||u.avatar||avatar(u.username);
      }
      save();
      closeSettings();
      showApp();
    });

    el.searchIn.addEventListener('input',()=>{st.q=el.searchIn.value;renderSearch();});
    el.searchUsers.addEventListener('click',e=>{const r=e.target.closest('[data-user]');if(!r)return;st.profileId=r.dataset.user;setView('profile');});
    el.recUsers.addEventListener('click',e=>{const r=e.target.closest('[data-user]');if(!r)return;st.profileId=r.dataset.user;setView('profile');});
    el.explore.addEventListener('click',e=>{const r=e.target.closest('[data-open-post]');if(!r)return;openPost(r.dataset.openPost);});
    el.trends.addEventListener('click',e=>{const t=e.target.closest('[data-trend]');if(!t)return;st.q=t.dataset.trend;el.searchIn.value=st.q;renderSearch();});

    el.readAll.addEventListener('click',markReadAll);
    el.notifs.addEventListener('click',e=>{
      const n=e.target.closest('[data-notif]');
      if(!n)return;
      const item=st.notifs.find(x=>x.id===n.dataset.notif);
      if(item)item.read=true;
      save();
      renderNotifs();
      if(n.dataset.post){openPost(n.dataset.post);return;}
      if(n.dataset.profile){st.profileId=n.dataset.profile;setView('profile');}
    });

    el.listBg.addEventListener('click',e=>{if(e.target===el.listBg)closeList();});
    el.closeList.addEventListener('click',closeList);
    el.listItems.addEventListener('click',e=>{
      const u=e.target.closest('[data-list-user]');
      if(u){st.profileId=u.dataset.listUser;closeList();setView('profile');return;}
      const p=e.target.closest('[data-list-post]');
      if(p){closeList();openPost(p.dataset.listPost);}
    });

    el.postBg.addEventListener('click',e=>{if(e.target===el.postBg)closePost();});
    el.closePost.addEventListener('click',closePost);
    el.postBody.addEventListener('click',e=>{
      const pid=e.target.closest('[data-post]')?.dataset.post;
      if(!pid)return;
      if(e.target.closest('.like')){toggleLike(pid);openPost(pid);return;}
      if(e.target.closest('.save')){toggleSave(pid);openPost(pid);return;}
      if(e.target.closest('.repost')){toggleRepost(pid);openPost(pid);return;}
      const sl=e.target.closest('[data-slide]');
      if(sl){slideMedia(sl.dataset.mediaPost,sl.dataset.slide,el.postBody);return;}
      const op=e.target.closest('[data-open-profile]');
      if(op){closePost();st.profileId=op.dataset.openProfile;setView('profile');}
    });

    el.verifyBg.addEventListener('click',e=>{if(e.target===el.verifyBg)closeVerify();});
    el.closeVerify.addEventListener('click',closeVerify);
    el.verifyF.addEventListener('submit',async e=>{
      e.preventDefault();
      const err=await submitVerifyRequest(el.verifyText.value,[...(el.verifyFiles.files||[])].slice(0,4));
      if(err){alert(err);return;}
      closeVerify();
      alert('Заявка отправлена в админ панель');
    });

    el.adminBg.addEventListener('click',e=>{if(e.target===el.adminBg)closeAdmin();});
    el.closeAdmin.addEventListener('click',closeAdmin);
    el.adminBody.addEventListener('click',e=>{
      const me=user();
      if(!me||me.role!=='admin')return;
      const b=e.target.closest('[data-admin-block]');
      if(b){
        const u=userBy(b.dataset.adminBlock);
        if(u&&u.role!=='admin'){u.blocked=!u.blocked;save();openAdmin();}
        return;
      }
      const d=e.target.closest('[data-admin-del-post]');
      if(d){
        st.posts=st.posts.filter(p=>p.id!==d.dataset.adminDelPost);
        st.notifs=st.notifs.filter(n=>n.postId!==d.dataset.adminDelPost);
        save();openAdmin();renderAll();
        return;
      }
      const o=e.target.closest('[data-admin-open-post]');
      if(o){closeAdmin();openPost(o.dataset.adminOpenPost);return;}
      const ap=e.target.closest('[data-admin-v-approve]');
      if(ap){
        const r=st.verifyRequests.find(x=>x.id===ap.dataset.adminVApprove);
        if(r){r.status='approved';r.handledAt=new Date().toISOString();r.handledBy=me.id;const u=userBy(r.userId);if(u)u.verified=true;save();openAdmin();renderAll();}
        return;
      }
      const rej=e.target.closest('[data-admin-v-reject]');
      if(rej){
        const r=st.verifyRequests.find(x=>x.id===rej.dataset.adminVReject);
        if(r){r.status='rejected';r.handledAt=new Date().toISOString();r.handledBy=me.id;save();openAdmin();}
      }
    });

    document.addEventListener('mousemove',e=>{
      const nav=qs('.side-nav');
      if(!nav||window.innerWidth<=920)return;
      const rect=nav.getBoundingClientRect();
      const nearX=e.clientX>=rect.left-66&&e.clientX<=rect.right+70;
      const nearY=e.clientY>=rect.top-24&&e.clientY<=rect.bottom+24;
      nav.classList.toggle('near',nearX&&nearY);
    });

    (async()=>{await load();if(st.uid&&user())showApp();else{st.uid=null;save();showAuth();}pullTimer=setInterval(()=>{if(st.uid)pullRemote(true);},3000);})();
  </script>
</body>
</html>
